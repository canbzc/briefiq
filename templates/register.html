<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Freelance Brief Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-box {
      width: 100%;
      max-width: 380px;
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 14px;
      padding: 36px 32px;
    }
    .auth-title { font-size: 1.3rem; font-weight: 600; color: #f8fafc; margin-bottom: 6px; }
    .auth-sub { font-size: 0.85rem; color: #475569; margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 0.8rem; color: #64748b; margin-bottom: 6px; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3348;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.92rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus { border-color: #6366f1; }
    .hint { font-size: 0.75rem; color: #475569; margin-top: 4px; }
    .btn-submit {
      width: 100%;
      padding: 11px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #4f51d8; }
    .auth-link { text-align: center; margin-top: 20px; font-size: 0.83rem; color: #475569; }
    .auth-link a { color: #6366f1; text-decoration: none; }
    .auth-link a:hover { text-decoration: underline; }
    .flash-error {
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      border-radius: 7px;
      color: #fca5a5;
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="auth-title">Create account</div>
    <div class="auth-sub">Freelance Brief Analyzer</div>

    {% if error %}
    <div class="flash-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" required placeholder="johndoe" minlength="3" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••" minlength="6" />
        <div class="hint">At least 6 characters</div>
      </div>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="auth-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</body>
</html>
