<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Server Error</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .code { font-size: 5rem; font-weight: 700; color: #f87171; line-height: 1; }
    .msg { font-size: 1.1rem; color: #94a3b8; margin: 12px 0 28px; }
    a {
      display: inline-block;
      padding: 10px 24px;
      background: #6366f1;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    a:hover { background: #4f51d8; }
  </style>
</head>
<body>
  <div>
    <div class="code">500</div>
    <div class="msg">Something went wrong on our end.</div>
    <a href="/">Go to Analyzer</a>
  </div>
</body>
</html>
